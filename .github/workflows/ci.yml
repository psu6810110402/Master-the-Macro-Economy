name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Dummy DB URLs used only for prisma generate/validate — no real connection needed
env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
  DIRECT_URL: postgresql://ci:ci@localhost:5432/ci
  NEXT_PUBLIC_API_URL: http://localhost:3001
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

jobs:
  # ─── TYPE CHECK ────────────────────────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/database/prisma/schema.prisma

      - name: Type check (web)
        run: cd apps/web && npx tsc --noEmit

      - name: Type check (api)
        run: cd apps/api && npx tsc --noEmit

  # ─── BUILD WEB ─────────────────────────────────────────────────────────────
  build-web:
    name: Build Web (Next.js)
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/database/prisma/schema.prisma

      - name: Build web
        run: cd apps/web && npx next build

  # ─── BUILD API ─────────────────────────────────────────────────────────────
  build-api:
    name: Build API (NestJS)
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/database/prisma/schema.prisma

      - name: Build API
        run: cd apps/api && npx nest build

  # ─── PRISMA VALIDATE ───────────────────────────────────────────────────────
  prisma-validate:
    name: Validate Prisma Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate schema
        run: npx prisma validate --schema=packages/database/prisma/schema.prisma
